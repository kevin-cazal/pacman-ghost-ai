name: Test

on:
  push:
    branches: [main, feature-lua-code]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Fengari
        run: ./scripts/setup-fengari.sh

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run parity and browser tests
        run: npm run test:all
